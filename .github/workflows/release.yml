name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.32.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG version=$VERSION"

      - name: Validate Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version match confirmed: $CARGO_VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

      - name: Build release
        run: cargo build --release --all-features

      - name: Strip binaries
        run: strip target/release/vigil target/release/vigild

      - name: Prepare release assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="vigil-baseline-${VERSION}-linux-x86_64"
          mkdir -p "$STAGING"
          cp target/release/vigil "$STAGING/"
          cp target/release/vigild "$STAGING/"
          cp README.md LICENSE "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          echo "TARBALL=${STAGING}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=${STAGING}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          # Write to file to avoid shell escaping issues
          echo "$CHANGES" > /tmp/changelog.txt
          echo "file=/tmp/changelog.txt" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Vigil Baseline ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.file }}
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            ${{ env.TARBALL }}
            ${{ env.CHECKSUM }}

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          rm -rf vigil-baseline-* 
          cargo publish --allow-dirty
