[advisories]
version = 2
ignore = [
    # RUSTSEC-2026-0097: rand 0.9.x unsoundness with custom logger using rand::rng().
    # Only reachable via proptest (dev-dependency, test-only). proptest does not use
    # rand::rng() with a custom logger. No patched proptest release available yet
    # (proptest 1.11.0 pins rand 0.9.x). Remove this exemption when proptest upgrades
    # to rand 0.10.x.
    "RUSTSEC-2026-0097",
]

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Unicode-DFS-2016", "GPL-3.0-only", "Zlib"]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
