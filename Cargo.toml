[package]
name = "vigil"
version = "0.1.0"
edition = "2021"
description = "Lightweight file integrity monitor for Linux desktops"
license = "GPL-3.0"
authors = ["loujr"]

[[bin]]
name = "vigil"
path = "src/main.rs"

[[bin]]
name = "vigild"
path = "src/daemon.rs"

[dependencies]
# Hashing
blake3 = "1"

# Database
rusqlite = { version = "0.31", features = ["bundled"] }

# Config
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# CLI
clap = { version = "4", features = ["derive"] }

# Linux syscalls
nix = { version = "0.28", features = [
    "event",
    "fs",
    "inotify",
    "mount",
    "process",
    "signal",
    "user",
] }

# Threading / channels
crossbeam-channel = "0.5"

# Logging
log = "0.4"
env_logger = "0.11"

# D-Bus (using notify-send CLI for desktop notifications;
# zbus can be added later for direct D-Bus integration)

# HMAC / integrity
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

# Pattern matching
glob = "0.3"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Unique IDs
uuid = { version = "1", features = ["v4"] }

# Extended attributes
xattr = "1"

# libc for direct syscalls (fanotify, ioprio, setpriority)
libc = "0.2"

# Byte order / misc
thiserror = "1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
